name: Deploy Documentation

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      
      - name: Install DocFX
        run: dotnet tool install -g docfx --version 2.*
      
      - name: Build documentation
        run: |
          cd docs
          docfx docfx.json
          mkdir -p api
          cp ../api/*.yml api/ 2>/dev/null || true
          docfx docfx.json
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages